apiVersion: 1
groups:
  - name: app-alerts
    interval: 1m
    rules:
      # Metric source: OTel semantic conventions (pre-1.23 naming)
      # http.server.duration → http_server_duration_milliseconds histogram
      # Labels: http_method, http_status_code, http_flavor, http_scheme

      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_duration_milliseconds_count{http_status_code=~"5.."}[5m]))
          /
          sum(rate(http_server_duration_milliseconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate"
          description: "Error rate is {{ humanizePercentage $value }} over the last 5 minutes."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_duration_milliseconds_bucket[5m])) by (le)
          ) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 500 ms"
          description: "P95 latency is {{ $value | humanize }} ms (SLO: 500 ms)."

      - alert: DatabaseUnreachable
        expr: |
          probe_success{job="readiness"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Readiness probe failing"
          description: "The /ready endpoint has been returning non-200 for more than 1 minute."

      - alert: HighRejectionRate
        expr: |
          sum(rate(http_server_duration_milliseconds_count{http_status_code="429"}[1m])) > 50
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "High rate of rejected requests (429)"
          description: "{{ $value | humanize }} requests/s are being rejected — possible brute-force or abuse."
