global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # Rule files are evaluated at this interval
  rule_files:
    - /etc/prometheus/recording_rules.yml

scrape_configs:
  # TODO: rename "app" if you want a more specific job name, and update the
  # `app:8000` target to your service's hostname:port (matches whatever
  # name you give the service in your docker-compose / k8s manifest).
  - job_name: app
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics

  - job_name: readiness
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://app:8000/ready
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
