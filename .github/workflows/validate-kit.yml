# Validation CI for THIS repo (the kit itself) — not an adopter-facing
# template. The templates adopters copy into their own repos live under
# ci-cd/github-actions/*.yml; this workflow exists to keep those templates,
# the Terraform module, and the observability stack from silently rotting.
name: Validate Kit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac-terraform/gcp-cloud-run
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check -recursive

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate merged compose config
        run: |
          docker compose --project-directory . \
            -f examples/minimal-service/docker-compose.yml \
            -f observability/docker-compose.observability.yml \
            --profile observability config -q

  minimal-service-smoke:
    runs-on: ubuntu-latest
    needs: compose-config
    steps:
      - uses: actions/checkout@v7
      - name: Boot the example service + observability stack
        run: |
          docker compose --project-directory . \
            -f examples/minimal-service/docker-compose.yml \
            -f observability/docker-compose.observability.yml \
            --profile observability up --build -d
      - name: Wait for /health
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then exit 0; fi
            sleep 2
          done
          echo "Service never became healthy" >&2
          exit 1
      - name: Verify /ready and /metrics
        run: |
          curl -sf http://localhost:8000/ready
          curl -sfL http://localhost:8000/metrics | head -5
      - name: Verify Prometheus targets are up
        run: |
          sleep 20  # let Prometheus complete at least one scrape
          curl -sf http://localhost:9090/api/v1/targets \
            | python3 -c "import sys,json; d=json.load(sys.stdin); active=d['data']['activeTargets']; assert active, 'no targets registered'; bad=[t for t in active if t['health']!='up']; sys.exit(1) if bad else print(f'{len(active)} target(s) up')"
      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose --project-directory . \
            -f examples/minimal-service/docker-compose.yml \
            -f observability/docker-compose.observability.yml \
            --profile observability logs
      - name: Tear down
        if: always()
        run: |
          docker compose --project-directory . \
            -f examples/minimal-service/docker-compose.yml \
            -f observability/docker-compose.observability.yml \
            --profile observability down -v

  pre-commit-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate pre-commit config parses and hook repos resolve
        run: |
          pip install pre-commit
          pre-commit validate-config ci-cd/pre-commit/.pre-commit-config.yaml
